[tool.black]
line-length = 88
target-version = ["py311"]
exclude = '''
/(
    \.git
    | \.venv
    | backend/ml_models
    | __pycache__
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88

[tool.ruff]
line-length = 88
exclude = ["backend/ml_models", ".venv", "dev-dist"]

[tool.ruff.lint]
select = ["E", "F", "W", "C", "N"]
ignore = ["E203"]

[tool.ruff.lint.per-file-ignores]
"backend/src/application/use_cases/suggested_picks_use_case.py" = ["C901"]
"backend/src/domain/services/ai_picks_service.py" = ["C901"]
"backend/src/domain/services/audit_service.py" = ["C901"]
"backend/src/domain/services/match_aggregator_service.py" = ["C901"]
"backend/src/domain/services/match_enrichment_service.py" = ["C901"]
"backend/src/domain/services/pick_resolution_service.py" = ["C901"]
"backend/src/domain/services/picks_service.py" = ["C901"]
"backend/src/domain/services/prediction_service.py" = ["C901"]
"backend/src/domain/services/risk_management/risk_manager.py" = ["C901"]
"backend/src/domain/services/statistics_service.py" = ["C901"]
"backend/src/infrastructure/data_sources/espn.py" = ["C901"]
"backend/src/infrastructure/data_sources/football_data_org.py" = ["C901"]
"backend/src/infrastructure/data_sources/football_data_uk.py" = ["C901"]
"backend/src/infrastructure/data_sources/github_dataset.py" = ["C901"]
"backend/src/scheduler.py" = ["C901"]
