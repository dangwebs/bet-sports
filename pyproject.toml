[tool.black]
line-length = 88
target-version = ["py311"]
exclude = '''
/(
    \.git
    | \.venv
    | backend/ml_models
    | __pycache__
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88

[tool.ruff]
line-length = 88
select = ["E", "F", "W", "C", "N"]
ignore = ["E203"]
exclude = ["backend/ml_models", ".venv", "dev-dist"]

[tool.ruff.per-file-ignores]
"backend/src/domain/services/picks_service.py" = ["C901"]
