repos:
  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        args: ["--line-length=88"]

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile=black"]

  # Ruff hook (use local system-installed ruff to avoid pre-commit remote rev issues)

  # Frontend linting is handled by local npm commands to avoid remote mirror issues.
  # Use the local hooks below which run `npm run --prefix frontend lint` and `npx prettier`.

  - repo: local
    hooks:
      - id: npm-install-frontend
        name: Install frontend deps (ad-hoc)
        entry: bash -c "(cd frontend && npm ci)"
        language: system
        stages: [manual]

      - id: eslint-frontend-local
        name: Frontend ESLint (local)
        entry: bash -c 'cd frontend && exec npm run lint -- "${@#frontend/}"' --
        language: system
        files: ^frontend/.*
      - id: ruff-local
        name: Ruff (local)
        entry: bash -c "cd backend && ./.venv/bin/ruff check --fix"
        language: system
        files: ^backend/.*\.py$
      - id: mypy-local
        name: Mypy (local)
        entry: bash -c "cd backend && ./.venv/bin/mypy src/ --ignore-missing-imports --follow-imports=skip"
        language: system
        pass_filenames: false
        files: ^backend/.*\.py$
