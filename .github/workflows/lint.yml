name: Lint

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python tools
        run: |
          pip install ruff black isort

      - name: Run Python linters on changed files
        run: |
          # Compare against main to get changed files in the PR and run linters only on Python files
          git fetch origin main || true
          FILES=$(git diff --name-only origin/main...HEAD || true)
          PY_FILES=$(echo "$FILES" | tr '\n' ' ' | xargs -n1 | grep -E '\.py$' || true)
          if [ -z "$PY_FILES" ]; then
            echo "No Python files changed; skipping ruff/black/isort"
            exit 0
          fi
          echo "Running checks on: $PY_FILES"
          ruff check $PY_FILES
          black --check $PY_FILES
          isort --check-only $PY_FILES

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Run frontend lint
        run: npm run lint
        working-directory: frontend
