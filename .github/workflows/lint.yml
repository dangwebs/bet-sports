name: Lint

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python tools
        run: |
          pip install ruff black isort

      - name: Run Python linters and type check
        run: |
          cd backend
          ruff check src/ tests/
          black --check src/ tests/
          isort --check-only src/ tests/
          python -m mypy src/ --ignore-missing-imports --follow-imports=skip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run frontend lint on changed files
        run: |
          # Only run frontend lint if frontend files changed in the PR
          git fetch origin main || true
          FILES=$(git diff --name-only origin/main...HEAD || true)
          FRONT_FILES=$(echo "$FILES" | tr '\n' ' ' | xargs -n1 | grep -E '^frontend/.*\.(ts|tsx|js|jsx)$' || true)
          if [ -z "$FRONT_FILES" ]; then
            echo "No frontend files changed; skipping frontend lint"
            exit 0
          fi
          echo "Running frontend lint on: $FRONT_FILES"
          cd frontend
          npm ci
          npm run lint -- $FRONT_FILES
