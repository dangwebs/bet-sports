name: CI

on:
  push:
    branches: ["develop", "main", "feat/*"]
  pull_request:
    branches: ["develop", "main"]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Lint changed Python files (pre-commit)
        run: |
          # Fetch main to compare changes in PRs
          git fetch origin main || true
          FILES_CHANGED=$(git diff --name-only origin/main...HEAD || true)
          PY_FILES=$(echo "$FILES_CHANGED" | tr '\n' ' ' | xargs -n1 | grep -E '\.py$' || true)
          if [ -z "$PY_FILES" ]; then
            echo "No Python files changed; skipping lint"
          else
            echo "Running pre-commit on: $PY_FILES"
            pre-commit run --verbose --files $PY_FILES
          fi

      - name: Run backend tests
        run: |
          PYTHONPATH=backend python -m pytest backend/tests -q
