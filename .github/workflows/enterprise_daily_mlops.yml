name: Enterprise Daily MLOps (Delegated to Docker Compose)

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional execution note"
        type: string
        required: false

permissions:
  contents: read

jobs:
  mlops-delegation-notice:
    name: 📌 MLOps Delegation Notice
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📢 Inform execution model
        run: |
          echo "### MLOps Execution Model" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "El entrenamiento ya no se ejecuta en GitHub Actions." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ejecuta el pipeline local/portable con Docker Compose:" >> $GITHUB_STEP_SUMMARY
          echo "\`./run_dev_pipeline.sh\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Comando equivalente:" >> $GITHUB_STEP_SUMMARY
          echo "\`docker compose -f docker-compose.dev.yml --profile mlops run --rm mlops-pipeline\`" >> $GITHUB_STEP_SUMMARY
