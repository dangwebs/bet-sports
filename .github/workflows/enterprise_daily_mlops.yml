name: Enterprise Daily MLOps

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:
    inputs:
      force_train:
        description: "Force Retraining"
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

env:
  PYTHON_VERSION: "3.11"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
  THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
  RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
  LOG_LEVEL: INFO
  # Configuración para aprovechar ambos cores disponibles en GitHub Actions
  OMP_NUM_THREADS: 2
  OPENBLAS_NUM_THREADS: 2
  MKL_NUM_THREADS: 2
  NUMEXPR_NUM_THREADS: 2
  N_JOBS: 2

jobs:
  # ------------------------------------------------------------------
  # JOB 1: MODEL TRAINING (Vertical Scaling)
  # ------------------------------------------------------------------
  train-model:
    name: 🧠 Train ML Model
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "backend/requirements-worker.txt"

      - name: 📦 Install Dependencies
        run: |
          cd backend
          pip install -r requirements-worker.txt

      - name: 🏋️ Run Training (Parallelized with 2 cores)
        run: |
          cd backend
          python scripts/orchestrator_cli.py train --days 400 --n-jobs 2

      - name: 📤 Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-model
          path: backend/ml_picks_classifier.joblib
          retention-days: 1
          compression-level: 9 # Compresión máxima para transferencia rápida

  # ------------------------------------------------------------------
  # JOB 2: PREDICTION MATRIX (Horizontal Scaling - 17 jobs en paralelo)
  # ------------------------------------------------------------------
  predict-leagues:
    name: 🔮 Predict ${{ matrix.group }}
    needs: train-model
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true # Una falla no detiene las demás
    strategy:
      max-parallel: 20 # GitHub permite hasta 20 jobs concurrentes en tier gratuito
      fail-fast: false # No detener otros jobs si uno falla
      matrix:
        include:
          # Dividir en grupos más pequeños para máximo paralelismo
          # Total: 17 jobs corriendo simultáneamente
          - group: "England_Premier"
            leagues: "E0"
          - group: "England_Championship"
            leagues: "E1"
          - group: "England_L1_L2"
            leagues: "E2,E3"
          - group: "Scotland"
            leagues: "SC0,SC1"
          - group: "Germany_Bundesliga"
            leagues: "D1"
          - group: "Germany_2"
            leagues: "D2"
          - group: "Netherlands"
            leagues: "N1"
          - group: "Belgium"
            leagues: "B1"
          - group: "Spain_LaLiga"
            leagues: "SP1"
          - group: "Spain_2"
            leagues: "SP2"
          - group: "Portugal"
            leagues: "P1"
          - group: "Turkey"
            leagues: "T1"
          - group: "Greece"
            leagues: "G1"
          - group: "Italy_SerieA"
            leagues: "I1"
          - group: "Italy_SerieB"
            leagues: "I2"
          - group: "France_Ligue1"
            leagues: "F1"
          - group: "France_Ligue2"
            leagues: "F2"

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "backend/requirements-worker.txt"

      - name: 📦 Install Dependencies
        run: |
          cd backend
          pip install -r requirements-worker.txt

      - name: 📥 Download Model
        uses: actions/download-artifact@v4
        with:
          name: ml-model
          path: backend/

      - name: 🚀 Run Predictions (Parallelized)
        run: |
          cd backend
          python scripts/orchestrator_cli.py predict --leagues "${{ matrix.leagues }}" --parallel

  # ------------------------------------------------------------------
  # JOB 3: AGGREGATION & REPORTING
  # ------------------------------------------------------------------
  finalize-process:
    name: 🏁 Finalize & Report
    needs: [predict-leagues]
    runs-on: ubuntu-latest
    if: always() # Run even if some matrix jobs failed

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "backend/requirements-worker.txt"

      - name: 📦 Install Dependencies
        run: |
          cd backend
          pip install -r requirements-worker.txt

      - name: 🏆 Generate Top Picks
        run: |
          cd backend
          python scripts/orchestrator_cli.py top-picks

      - name: 🧹 Clear Render Cache
        env:
          RENDER_APP_URL: "https://football-prediction-api-8sl4.onrender.com"
          ADMIN_TOKEN: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          curl -X DELETE "${RENDER_APP_URL}/cache/clear" \
            -H "X-Admin-Token: ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            --fail || echo "Warning: Failed to clear cache (Service might be sleeping)"

      - name: 📊 Summary Report
        if: always()
        run: |
          echo "### 📈 Pipeline Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Training: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- 🔮 Predictions: ${{ strategy.job-total }} leagues processed" >> $GITHUB_STEP_SUMMARY
          echo "- 🏆 Top Picks: Generated" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Parallelism: 17 concurrent jobs" >> $GITHUB_STEP_SUMMARY

      - name: 📧 Notify on Failure
        if: contains(needs.*.result, 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Daily MLOps Pipeline Failed',
              body: `The pipeline failed on run #${context.runNumber}. Check logs at: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automated', 'mlops']
            })
