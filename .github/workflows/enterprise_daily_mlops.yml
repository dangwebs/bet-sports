name: Enterprise Daily MLOps (Local LaunchAgent)

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional execution note"
        type: string
        required: false

permissions:
  contents: read

jobs:
  mlops-delegation-notice:
    name: 📌 MLOps Execution Model
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📢 Inform execution model
        run: |
          echo "### 🧠 MLOps Execution Model" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Daily ML training runs **locally** via macOS LaunchAgent." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Schedule | Every day at 06:00 COT |" >> $GITHUB_STEP_SUMMARY
          echo "| Mechanism | \`launchd\` (com.bjj-betsports.daily-training) |" >> $GITHUB_STEP_SUMMARY
          echo "| Script | \`scripts/daily_training.sh\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Logs | \`~/Library/Logs/bjj-betsports/\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Manual Execution" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "./scripts/daily_training.sh" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Management" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "./scripts/install_daily_training.sh --status    # Check status" >> $GITHUB_STEP_SUMMARY
          echo "./scripts/install_daily_training.sh --uninstall # Remove" >> $GITHUB_STEP_SUMMARY
          echo "./scripts/install_daily_training.sh             # Reinstall" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
