name: Enterprise Daily MLOps

on:
  schedule:
    - cron: "0 */12 * * *" # Every 12 hours (00:00, 12:00 UTC)
  workflow_dispatch:
    inputs:
      force_train:
        description: "Force Retraining"
        type: boolean
        default: true

# Evita condiciones de carrera y ahorra recursos cancelando ejecuciones obsoletas
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

env:
  PYTHON_VERSION: "3.11"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
  THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
  RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
  LOG_LEVEL: INFO
  # Optimización: Los runners estándar de GitHub tienen 2 vCPUs.
  # Ajustar a 2 evita el overhead por context switching excesivo y mejora la estabilidad.
  OMP_NUM_THREADS: 2
  OPENBLAS_NUM_THREADS: 2
  MKL_NUM_THREADS: 2
  NUMEXPR_NUM_THREADS: 2
  N_JOBS: 2

jobs:
  # ------------------------------------------------------------------
  # JOB 1: MODEL TRAINING (Vertical Scaling)
  # ------------------------------------------------------------------
  train-model:
    name: 🧠 Train ML Model
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      cache-key: ${{ steps.set-cache-key.outputs.key }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "backend/requirements-worker.txt"

      - name: 🔑 Generate Cache Key
        id: set-cache-key
        run: echo "key=venv-${{ runner.os }}-${{ hashFiles('backend/requirements-worker.txt') }}" >> $GITHUB_OUTPUT

      - name: ♻️ Restore Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: ${{ steps.set-cache-key.outputs.key }}

      - name: 📦 Install Dependencies (If Cache Miss)
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          cd backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements-worker.txt

      - name: 🏋️ Run Training (Max Power)
        run: |
          cd backend
          source .venv/bin/activate
          # $(nproc) detecta dinámicamente los cores disponibles para usar toda la potencia real
          python scripts/orchestrator_cli.py train --days 400 --n-jobs $(nproc)

      - name: 📤 Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-model
          path: backend/ml_picks_classifier.joblib
          retention-days: 1
          compression-level: 6 # Balance óptimo entre velocidad de CPU y tamaño

  # ------------------------------------------------------------------
  # JOB 2: PREDICTION MATRIX (Horizontal Scaling - 17 jobs en paralelo)
  # ------------------------------------------------------------------
  predict-leagues:
    name: 🔮 Predict ${{ matrix.group }}
    needs: train-model
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true # Una falla no detiene las demás
    strategy:
      max-parallel: 20 # GitHub permite hasta 20 jobs concurrentes en tier gratuito
      fail-fast: false # No detener otros jobs si uno falla
      matrix:
        include:
          # Dividir en grupos más pequeños para máximo paralelismo
          # Total: 7 jobs corriendo simultáneamente (Top Tier Only)
          - group: "England_Premier"
            leagues: "E0"
          - group: "Germany_Bundesliga"
            leagues: "D1"
          - group: "Belgium"
            leagues: "B1"
          - group: "Spain_LaLiga"
            leagues: "SP1"
          - group: "Portugal"
            leagues: "P1"
          - group: "Italy_SerieA"
            leagues: "I1"
          - group: "France_Ligue1"
            leagues: "F1"

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          # No necesitamos cache pip aquí, usamos el venv completo restaurado

      - name: ♻️ Restore Virtual Environment
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: ${{ needs.train-model.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: 📥 Download Model
        uses: actions/download-artifact@v4
        with:
          name: ml-model
          path: backend/

      - name: 🚀 Run Predictions (Parallelized)
        run: |
          cd backend
          source .venv/bin/activate
          python scripts/orchestrator_cli.py predict --leagues "${{ matrix.leagues }}" --parallel

  # ------------------------------------------------------------------
  # JOB 3: AGGREGATION & REPORTING
  # ------------------------------------------------------------------
  finalize-process:
    name: 🏁 Finalize & Report
    needs: [train-model, predict-leagues]
    runs-on: ubuntu-latest
    if: always() # Run even if some matrix jobs failed

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ♻️ Restore Virtual Environment
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: ${{ needs.train-model.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: 🏆 Generate Top Picks
        if: needs.train-model.result == 'success'
        run: |
          cd backend
          source .venv/bin/activate
          python scripts/orchestrator_cli.py top-picks

      - name: 🧹 Clear Render Cache
        env:
          RENDER_APP_URL: "https://football-prediction-api-8sl4.onrender.com"
          # IMPORTANTE: Verifica que este secreto coincida con la validación de tu backend para X-Admin-Token
          ADMIN_TOKEN: ${{ secrets.RAPIDAPI_KEY }}
        if: needs.train-model.result == 'success'
        run: |
          echo "Intentando limpiar caché en: $RENDER_APP_URL"
          # Bucle de reintentos para manejar 'Cold Starts' de Render y despliegues lentos
          # Total espera: 30 * 20s = 600s (10 minutos)
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE "${RENDER_APP_URL}/cache/clear" \
              -H "X-Admin-Token: ${ADMIN_TOKEN}" \
              -H "Content-Type: application/json")
            
            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 204 ]; then
              echo "✅ Caché limpiada exitosamente."
              exit 0
            fi
            echo "⚠️ Intento $i falló con código $HTTP_CODE. El servicio puede estar durmiendo o desplegando. Reintentando en 20s..."
            sleep 20
          done
          echo "❌ Error Crítico: No se pudo limpiar la caché. Los datos en producción estarán desactualizados."
          exit 1

      - name: 📊 Summary Report
        if: always()
        run: |
          echo "### 📈 Pipeline Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Training: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- 🔮 Predictions: Processed" >> $GITHUB_STEP_SUMMARY
          echo "- 🏆 Top Picks: Generated" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Parallelism: 17 concurrent jobs" >> $GITHUB_STEP_SUMMARY

      - name: 📧 Notify on Failure
        if: contains(needs.*.result, 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Daily MLOps Pipeline Failed',
              body: `The pipeline failed on run #${context.runNumber}. Check logs at: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automated', 'mlops']
            })
