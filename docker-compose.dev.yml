# Docker Compose para desarrollo con paridad a producción
# Uso: docker compose -f docker-compose.dev.yml up -d

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: bjj-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bjj_betsports
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
