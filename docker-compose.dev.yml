# Docker Compose para desarrollo con paridad a producción
# Uso: docker compose -f docker-compose.dev.yml up -d

version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: bjj-mongo-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: bjj_betsports
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bjj-ml-worker-dev
    environment:
      MONGO_URI: "mongodb://admin:adminpassword@mongodb:27017/"
      MONGO_DB_NAME: "bjj_betsports"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_USERNAME: ${GITHUB_USERNAME:-Worker-Bot}
      GITHUB_EMAIL: ${GITHUB_EMAIL:-worker@bjj-betsports.local}
      GITHUB_REPO: ${GITHUB_REPO:-}
      # Insert other env vars manually if needed via .env
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
