# Docker Compose local portable
# Uso base: docker compose -f docker-compose.dev.yml up -d
# Pipeline MLOps local: docker compose -f docker-compose.dev.yml --profile mlops run --rm mlops-pipeline

x-project-image: &project-image
  build:
    context: .
    dockerfile: Dockerfile.portable
  image: bjj-betsports-app:local

services:
  mongodb:
    image: mongo:6.0
    container_name: bjj-mongo-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: bjj_betsports
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    <<: *project-image
    container_name: bjj-backend-api-dev
    working_dir: /workspace/backend
    command: ["python3", "-m", "uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: "mongodb://admin:adminpassword@mongodb:27017/"
      MONGO_DB_NAME: "bjj_betsports"
      DISABLE_ML_TRAINING: ${DISABLE_ML_TRAINING:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      N_JOBS: ${N_JOBS:-2}
      TRAIN_DAYS: ${TRAIN_DAYS:-550}
      PREDICT_LEAGUES: ${PREDICT_LEAGUES:-E0}
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./backend:/workspace/backend:rw

  frontend:
    <<: *project-image
    container_name: bjj-frontend-dev
    working_dir: /workspace/frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_API_PROXY_TARGET: http://backend-api:8000
    ports:
      - "5173:5173"
    depends_on:
      backend-api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./frontend:/workspace/frontend:rw
      - /workspace/frontend/node_modules

  ml-worker:
    <<: *project-image
    container_name: bjj-ml-worker-dev
    working_dir: /workspace/backend
    command: ["python3", "src/worker.py"]
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: "mongodb://admin:adminpassword@mongodb:27017/"
      MONGO_DB_NAME: "bjj_betsports"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WORKER_MODE: ${WORKER_MODE:-cron}
      WORKER_RUN_IMMEDIATE: ${WORKER_RUN_IMMEDIATE:-false}
    depends_on:
      mongodb:
        condition: service_healthy
    profiles: ["automation"]
    restart: unless-stopped
    volumes:
      - ./backend:/workspace/backend:rw

  mlops-pipeline:
    <<: *project-image
    container_name: bjj-mlops-pipeline-dev
    working_dir: /workspace/backend
    command: ["bash", "-lc", "./scripts/local_mlops_pipeline.sh"]
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: "mongodb://admin:adminpassword@mongodb:27017/"
      MONGO_DB_NAME: "bjj_betsports"
      N_JOBS: ${N_JOBS:-4}
      TRAIN_DAYS: ${TRAIN_DAYS:-550}
      PREDICT_LEAGUES: ${PREDICT_LEAGUES:-E0,SP1,D1,I1,F1,P1,B1,UCL}
      TOP_PICKS_LIMIT: ${TOP_PICKS_LIMIT:-50}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      mongodb:
        condition: service_healthy
    profiles: ["mlops"]

  labeler:
    <<: *project-image
    container_name: bjj-labeler-dev
    working_dir: /workspace/backend
    command: ["python3", "/workspace/backend/scripts/labeler_service_safe.py"]
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: "mongodb://admin:adminpassword@mongodb:27017/"
      MONGO_DB_NAME: "bjj_betsports"
      LABELER_INTERVAL_SEC: ${LABELER_INTERVAL_SEC:-600}
      LABELER_SCRIPT_PATH: /workspace/backend/scripts/label_finished_matches.py
      LABELER_LIMIT: ${LABELER_LIMIT:-200}
      LABELER_RETRIES: ${LABELER_RETRIES:-3}
      LABELER_DRY_RUN: ${LABELER_DRY_RUN:-false}
      LABELER_TIMEOUT_SEC: ${LABELER_TIMEOUT_SEC:-300}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      mongodb:
        condition: service_healthy
    profiles: ["automation"]
    restart: unless-stopped
    volumes:
      - ./backend:/workspace/backend:rw

  updater:
    <<: *project-image
    container_name: bjj-updater-dev
    working_dir: /workspace/backend
    command: ["python3", "/workspace/backend/scripts/updater_service.py"]
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: "mongodb://admin:adminpassword@mongodb:27017/"
      MONGO_DB_NAME: "bjj_betsports"
      UPDATER_INTERVAL_SEC: ${UPDATER_INTERVAL_SEC:-600}
      UPDATER_SCRIPT_PATH: /workspace/backend/scripts/update_predictions_with_results.py
      UPDATER_DAYS_BACK: ${UPDATER_DAYS_BACK:-3}
      UPDATER_DRY_RUN: ${UPDATER_DRY_RUN:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      mongodb:
        condition: service_healthy
    profiles: ["automation"]
    restart: unless-stopped
    volumes:
      - ./backend:/workspace/backend:rw

volumes:
  mongodb_data:
